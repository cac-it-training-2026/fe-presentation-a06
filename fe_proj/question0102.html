<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>機械学習 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <header>
            グループA06 機械学習の基礎概念と種類<br/>（教師あり学習・教師なし学習）<br />
            基本情報技術者試験「風」問題<br />
        </header>

        <div class="quiz-container">
            <h3 class="quiz-question">
                問題2：教師あり学習の説明として，最も適切なものはどれか。
            </h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" />
                    ア　正解が付いたデータを使って，その関係を学習する方法である。
                </label>

                <label>
                    <input type="radio" name="q1" value="2" />
                    イ　正解を使わずに，データの特徴だけから分類する方法である。
                </label>

                <label>
                    <input type="radio" name="q1" value="3" />
                    ウ　報酬をもとに，よい行動を選ぶように学習する方法である。
                </label>

                <label>
                    <input type="radio" name="q1" value="4" />
                    エ　データをグループに分けて，似たもの同士をまとめる方法である。
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>

                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：ア</strong>
                    </p>

                    <p class="explanation">
                        <strong>解説：</strong><br />
                        正解はア
                        教師あり学習とは，
                        正解ラベルが付与された「教師データ」を用いてAIを学習させる機械学習の手法です。<br /><br />
						<br /><br />

                        なお，<br/>
                        イは教師なし学習の説明です。<br/>
                        ウは教科学習の説明です。<br/>
                        エは教師なし学習の説明です。<br/>
                    </p>
                </div>
            </details>
             <a href="question0101.html" class="btn btn_back">
			  前の問題
			</a>
            <a href="question0103.html" class="btn btn_next">
			  次の問題
			</a>
        </div>
    </body>
</html>
