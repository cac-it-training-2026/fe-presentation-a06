<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>機械学習 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <header>
            グループA06 機械学習の基礎概念と種類（教師あり学習・教師なし学習）<br />
            基本情報技術者試験「風」問題<br />
        </header>

        <div class="quiz-container">
            <h3 class="quiz-question">
                問題1:機械学習における教師あり学習の説明として，最も適切なものはどれか。
            </h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" />
                    ア　過去の売上データから傾向を分析し，将来の売上を正解データなしで予測する手法である。
                </label>

                <label>
                    <input type="radio" name="q1" value="2" />
                    イ　入力データに対して正解ラベルを付与し，その対応関係を学習することで未知データの分類や予測を行う手法である。
                </label>

                <label>
                    <input type="radio" name="q1" value="3" />
                    ウ　データの類似性のみに基づいてグループ分けを行い，あらかじめ用意された正解と比較して評価する手法である。
                </label>

                <label>
                    <input type="radio" name="q1" value="4" />
                    エ　行動の結果として得られる報酬のみを用い，最も報酬が大きくなる行動方針を学習する手法である。
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>

                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：イ</strong>
                    </p>

                    <p class="explanation">
                        <strong>解説：</strong><br />
                        正解は　イ<br>
                        教師あり学習とは，
                        入力データとそれに対応する正解データ（ラベル）を
                        与えて学習させる機械学習の手法です。<br /><br />

                        AIは学習データから規則性を学び，
                        未知のデータに対しても予測や分類を行えるようになります。<br /><br />

                        なお，<br/>
                        アは教師なし学習の説明です。<br/>
                        ウはクラスタリングの説明です。<br/>
                        エは強化学習の説明です。<br/>
                    </p>
                </div>
            </details>

			  トップに戻る
			</a>

			</a>

        </div>
    </body>
</html>
