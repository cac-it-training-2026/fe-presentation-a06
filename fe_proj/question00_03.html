<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>機械学習 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <header>
	グループA06 機械学習の基礎概念と種類<br>（教師あり学習・教師なし学習）<br>
	基本情報技術者試験「風」問題
    </header>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題1 機械学習の基礎概念について、正しいものを選びなさい。</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> ア　パソコンやスマートフォンなどの電子端末を用いて、<br>
                    　　インターネットを通じて学習を行うこと。
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> イ　コンピュータにデータを読み込ませ、<br>　　パターンや規則性を学習させること。
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> ウ　データを表形式で管理すること。
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> エ　膨大なデータから、データのパターンを見出すこと
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：イ　コンピュータにデータを読み込ませ、パターンや規則性を学習させること。</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        機械学習とは、人間がすべてのルールをコードに書き込む代わりに、コンピューターに大量のデータを読み込ませ、その中にあるパターンや規則性を自ら発見させる技術です
                    	<br>
                    	その他の回答
                    	<br>
                    	ア　e-ラーニングの説明になります。<br>
                    	ウ　RDBMSの説明になります。<br>
                    	エ　データマイニングの説明になります。<br>
                    
                    </p>
                </div>
            </details>
            <a href="index.html" class="btn btn_back">
			  トップへ戻る
			</a>
            <a href="question00.html" class="btn btn_next">
			  次の問題
			</a>
        </div>
    </body>
</html>
